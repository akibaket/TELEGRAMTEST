<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burst Clicker | Cyberpunk Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --dark-bg: #020617;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .neon-border {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .stat-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), #3b82f6);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 1s ease-out;
        }

        .tab-active {
            color: var(--neon-blue);
            border-bottom: 2px solid var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.2);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .loader-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Cargador Neural -->
    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950">
        <div class="w-20 h-20 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full loader-spin"></div>
        <p class="mt-6 cyber-font text-cyan-400 tracking-widest animate-pulse">SINCRONIZANDO LINK...</p>
        <p id="error-display" class="mt-4 text-red-500 hidden text-center px-6 text-sm"></p>
    </div>

    <!-- Header Stats -->
    <header class="p-4 flex justify-between items-center glass-panel border-b border-cyan-900/30 sticky top-0 z-40">
        <div class="flex flex-col">
            <span class="text-[10px] text-cyan-500 cyber-font">BURST POINTS</span>
            <div class="flex items-center gap-2">
                <i class="ph ph-coins text-yellow-400"></i>
                <span id="ui-points" class="text-xl font-bold cyber-font">0</span>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[10px] text-pink-500 cyber-font">ENERGY</span>
            <div class="flex items-center gap-2">
                <span id="ui-energy" class="text-xl font-bold cyber-font">0/10</span>
                <i class="ph ph-lightning-fill text-pink-500"></i>
            </div>
        </div>
    </header>

    <!-- App Content -->
    <main class="flex-1 p-4 pb-24">
        
        <!-- Pestaña Perfil -->
        <section id="tab-profile" class="tab-content space-y-6">
            <div class="relative glass-panel rounded-3xl p-6 overflow-hidden neon-border">
                <div class="scan-line"></div>
                
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="ui-username" class="text-2xl font-bold cyber-font text-white italic">---</h2>
                        <span id="ui-level" class="inline-block mt-1 bg-cyan-950 text-cyan-400 text-[10px] px-2 py-0.5 rounded border border-cyan-500/40 cyber-font">LEVEL --</span>
                    </div>
                    <i class="ph ph-cpu text-4xl text-cyan-500/30"></i>
                </div>

                <div class="grid grid-cols-1 gap-5">
                    <div class="space-y-1.5">
                        <div class="flex justify-between text-[11px] uppercase tracking-widest text-slate-400">
                            <span>Fuerza (STR)</span>
                            <span id="ui-str" class="text-cyan-400 font-bold">0</span>
                        </div>
                        <div class="stat-bar"><div id="bar-str" class="stat-progress" style="width: 0%"></div></div>
                    </div>
                    <div class="space-y-1.5">
                        <div class="flex justify-between text-[11px] uppercase tracking-widest text-slate-400">
                            <span>Agilidad (AGI)</span>
                            <span id="ui-agi" class="text-pink-400 font-bold">0</span>
                        </div>
                        <div class="stat-bar"><div id="bar-agi" class="stat-progress" style="width: 0%; background: #ff00ff; box-shadow: 0 0 10px #ff00ff;"></div></div>
                    </div>
                    <div class="space-y-1.5">
                        <div class="flex justify-between text-[11px] uppercase tracking-widest text-slate-400">
                            <span>Inteligencia (INT)</span>
                            <span id="ui-int" class="text-purple-400 font-bold">0</span>
                        </div>
                        <div class="stat-bar"><div id="bar-int" class="stat-progress" style="width: 0%; background: #a855f7; box-shadow: 0 0 10px #a855f7;"></div></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-white/5">
                    <div class="text-center">
                        <span class="block text-[10px] text-slate-500 uppercase cyber-font">Health (HP)</span>
                        <span id="ui-hp" class="text-xl font-bold text-green-400 cyber-font">0</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-[10px] text-slate-500 uppercase cyber-font">Attack</span>
                        <span id="ui-dmg" class="text-xl font-bold text-red-500 cyber-font">0</span>
                    </div>
                </div>
            </div>
            
            <div id="ascend-container" class="hidden">
                <button onclick="handleAscend()" class="w-full py-4 glass-panel rounded-2xl border-yellow-600/50 text-yellow-500 cyber-font text-sm tracking-widest active:scale-95 transition-transform">
                    ASCENDER AL NIVEL <span id="ui-next-level"></span>
                </button>
                <p class="text-[10px] text-center text-yellow-600/60 mt-2 uppercase">Cuidado: Perderás tus puntos actuales al subir</p>
            </div>
        </section>

        <!-- Pestaña Arena -->
        <section id="tab-arena" class="tab-content hidden">
            <h3 class="cyber-font text-lg text-cyan-400 mb-6 flex items-center gap-2">
                <i class="ph ph-broadcast"></i> RED DE DUELISTAS
            </h3>
            <div id="arena-list" class="space-y-4">
                <div class="p-8 text-center text-slate-600 animate-pulse cyber-font">Rastreando señales...</div>
            </div>
        </section>

        <!-- Pestaña Ruleta -->
        <section id="tab-wheel" class="tab-content hidden flex flex-col items-center justify-center py-12">
            <div class="relative w-48 h-48 mb-8">
                <div class="absolute inset-0 border-8 border-dashed border-pink-500/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="ph ph-clover text-6xl text-pink-500 opacity-50"></i>
                </div>
            </div>
            <h3 class="cyber-font text-xl text-pink-500">TERMINAL DE FORTUNA</h3>
            <p class="text-slate-400 text-sm mt-2">Costo: 50 Burst Points</p>
            <button class="mt-10 px-12 py-3 bg-pink-600 rounded-full cyber-font font-bold shadow-[0_0_20px_rgba(255,0,255,0.4)] active:scale-95">GIRAR</button>
        </section>

    </main>

    <!-- Nav Bar -->
    <nav class="fixed bottom-0 left-0 right-0 glass-panel border-t border-cyan-900/30 px-8 py-4 flex justify-between items-center z-40">
        <button onclick="changeTab('profile')" id="nav-profile" class="tab-active flex flex-col items-center gap-1">
            <i class="ph ph-user-circle text-2xl"></i>
            <span class="text-[9px] cyber-font">ID</span>
        </button>
        <button onclick="changeTab('arena')" id="nav-arena" class="text-slate-500 flex flex-col items-center gap-1">
            <i class="ph ph-sword text-2xl"></i>
            <span class="text-[9px] cyber-font">ARENA</span>
        </button>
        <button onclick="changeTab('wheel')" id="nav-wheel" class="text-slate-500 flex flex-col items-center gap-1">
            <i class="ph ph-clover text-2xl"></i>
            <span class="text-[9px] cyber-font">LUCK</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp, collection, query, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ==========================================
        // ⚠️ PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyAb6Y2Qoo7e3ceVb-yf8zIuj_grrhll7rM",
  authDomain: "telegramtest-4279a.firebaseapp.com",
  projectId: "telegramtest-4279a",
  storageBucket: "telegramtest-4279a.firebasestorage.app",
  messagingSenderId: "1006625167364",
  appId: "1:1006625167364:web:f28361096019df39b37d51"
};

        // Inicialización
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let localUser = null;

        // Función para mostrar error
        const logError = (msg) => {
            const errEl = document.getElementById('error-display');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
        };

        // Lógica de pestañas
        window.changeTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('text-slate-500');
            });

            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`nav-${tabId}`).classList.add('tab-active');
            document.getElementById(`nav-${tabId}`).classList.remove('text-slate-500');
        };

        // Inicializar Jugador
        async function setupPlayer(user) {
            try {
                // Usamos una ruta simple compatible con cualquier Firebase
                const pRef = doc(db, "players", user.uid);
                const pSnap = await getDoc(pRef);

                if (!pSnap.exists()) {
                    // Generar Carta de Personaje (RNG 5-15)
                    const str = Math.floor(Math.random() * 11) + 5;
                    const agi = Math.floor(Math.random() * 11) + 5;
                    const int = Math.floor(Math.random() * 11) + 5;
                    const tgName = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || `Burst_${user.uid.substring(0,4)}`;

                    const initialData = {
                        uid: user.uid,
                        username: tgName,
                        points: 100,
                        level: 1,
                        energy: 10,
                        stats: { str, agi, int },
                        createdAt: serverTimestamp()
                    };

                    await setDoc(pRef, initialData);
                    
                    // Registro público para Arena
                    await setDoc(doc(db, "arena_list", user.uid), {
                        username: tgName,
                        level: 1,
                        uid: user.uid
                    });
                }

                // Escuchar cambios
                onSnapshot(pRef, (snap) => {
                    if (snap.exists()) {
                        localUser = snap.data();
                        renderUI();
                        document.getElementById('loader').classList.add('hidden');
                    }
                });

            } catch (e) {
                logError("Error de sincronización: " + e.message);
            }
        }

        function renderUI() {
            if (!localUser) return;

            // Header
            document.getElementById('ui-points').innerText = localUser.points;
            document.getElementById('ui-energy').innerText = `${localUser.energy}/10`;

            // Card
            document.getElementById('ui-username').innerText = localUser.username;
            document.getElementById('ui-level').innerText = `LEVEL ${localUser.level}`;
            document.getElementById('ui-str').innerText = localUser.stats.str;
            document.getElementById('ui-agi').innerText = localUser.stats.agi;
            document.getElementById('ui-int').innerText = localUser.stats.int;

            // Progress Bars (Base 30 para el inicio)
            document.getElementById('bar-str').style.width = `${(localUser.stats.str / 30) * 100}%`;
            document.getElementById('bar-agi').style.width = `${(localUser.stats.agi / 30) * 100}%`;
            document.getElementById('bar-int').style.width = `${(localUser.stats.int / 30) * 100}%`;

            // Derived
            document.getElementById('ui-hp').innerText = localUser.stats.str * 10 + (localUser.level * 20);
            document.getElementById('ui-dmg').innerText = localUser.stats.str * 2 + (localUser.level * 5);

            // Ascend Logic
            const cost = Math.pow(2, localUser.level) * 100;
            if (localUser.points >= cost && localUser.level < 10) {
                document.getElementById('ascend-container').classList.remove('hidden');
                document.getElementById('ui-next-level').innerText = localUser.level + 1;
            } else {
                document.getElementById('ascend-container').classList.add('hidden');
            }
        }

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                setupPlayer(user);
            } else {
                signInAnonymously(auth).catch(e => logError("Error de autenticación: " + e.message));
            }
        });

        // Telegram Integration
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.headerColor = '#020617';
        }

    </script>
</body>
</html>
